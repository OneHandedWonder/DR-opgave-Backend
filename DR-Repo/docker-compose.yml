
services:
  postgres:
    image: postgres:17
    container_name: DR-Records
    environment:
      POSTGRES_USER: serviceuser
      POSTGRES_PASSWORD: superSecretPassword
      POSTGRES_DB: RecordsDB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serviceuser -d RecordsDB"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: